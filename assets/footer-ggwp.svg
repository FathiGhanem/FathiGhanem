<svg viewBox="0 0 1000 120" width="1000" height="120" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <filter id="g3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00ffcc"/>
      <stop offset="85%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes dashMove { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
      .ekg { stroke-dasharray: 500; animation: dashMove 3s linear infinite; }
      @keyframes blink { 0%,55% {opacity:1;} 56%,100% {opacity:0;} }
      .blink { animation: blink 1.1s steps(1) infinite; }
      @keyframes beat { 0%,100% { transform: scale(1); } 12% { transform: scale(1.25); } 24% { transform: scale(1); } }
      .heart { transform-origin: 500px 38px; animation: beat 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1000" height="120" fill="#05060c"/>

  <!-- EKG heartbeat line -->
  <path class="ekg" fill="none" stroke="url(#fade)" stroke-width="2" filter="url(#g3)"
    d="M 0 70 L 180 70 L 210 70 L 225 45 L 240 95 L 255 30 L 270 70 L 430 70 L 460 70 L 475 45 L 490 95 L 505 30 L 520 70 L 680 70 L 710 70 L 725 45 L 740 95 L 755 30 L 770 70 L 1000 70"/>

  <text class="heart" x="500" y="44" text-anchor="middle" font-size="16" fill="#ff2d78">❤</text>

  <text x="500" y="100" text-anchor="middle" font-size="14" letter-spacing="4" fill="#00ffcc" filter="url(#g3)">GG WP — IN CODE AND IN GAMES, I NEVER RAGE QUIT</text>
  <text x="965" y="30" text-anchor="end" font-size="11" letter-spacing="2" fill="#6e00ff">UPTIME: ∞</text>
  <text x="35" y="30" font-size="11" letter-spacing="2" fill="#6e00ff" class="blink">● LIVE</text>
</svg>
