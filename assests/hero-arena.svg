<svg viewBox="0 0 1000 400" width="1000" height="400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <!-- ══ GRADIENTS ══ -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="70%" stop-color="#0a0b18"/>
      <stop offset="100%" stop-color="#120a24"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="55%" stop-color="#6e00ff"/>
      <stop offset="100%" stop-color="#6e00ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#6e00ff"/>
    </linearGradient>
    <linearGradient id="floorFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e00ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6e00ff" stop-opacity="0.55"/>
    </linearGradient>

    <!-- ══ GLOW FILTERS ══ -->
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ══ SCANLINES ══ -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.035"/>
    </pattern>

    <style>
      .grid-line { stroke:#6e00ff; stroke-width:1; opacity:0.5; }
      @keyframes floorMove {
        from { transform: translateY(0px); }
        to   { transform: translateY(30px); }
      }
      .floor { animation: floorMove 1.6s linear infinite; }
      @keyframes blink { 0%,55% {opacity:1;} 56%,100% {opacity:0;} }
      .blink { animation: blink 1.1s steps(1) infinite; }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.4; }
        94% { opacity: 1; }
        97% { opacity: 0.6; }
        98% { opacity: 1; }
      }
      .flicker { animation: flicker 5s linear infinite; }
      @keyframes scanBand {
        from { transform: translateY(-60px); }
        to   { transform: translateY(420px); }
      }
      .band { animation: scanBand 6s linear infinite; }
      @keyframes rise {
        0%   { transform: translateY(0); opacity: 0; }
        15%  { opacity: 0.9; }
        100% { transform: translateY(-180px); opacity: 0; }
      }
      .p1 { animation: rise 5s   linear infinite; }
      .p2 { animation: rise 7s   linear 1.2s infinite; }
      .p3 { animation: rise 6s   linear 2.4s infinite; }
      .p4 { animation: rise 8s   linear 0.6s infinite; }
      .p5 { animation: rise 5.5s linear 3.1s infinite; }
    </style>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="1000" height="400" fill="url(#bgGrad)"/>

  <!-- retro sun behind title -->
  <g opacity="0.35">
    <circle cx="500" cy="230" r="150" fill="url(#sunGrad)">
      <animate attributeName="r" values="146;154;146" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ══ SYNTHWAVE FLOOR ══ -->
  <g clip-path="url(#floorClip)">
    <clipPath id="floorClip"><rect x="0" y="260" width="1000" height="140"/></clipPath>
    <rect x="0" y="260" width="1000" height="140" fill="url(#floorFade)" opacity="0.35"/>
    <!-- converging verticals -->
    <g opacity="0.6">
      <line class="grid-line" x1="500" y1="260" x2="500"  y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="300"  y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="100"  y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="-100" y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="-350" y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="700"  y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="900"  y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="1100" y2="400"/>
      <line class="grid-line" x1="500" y1="260" x2="1350" y2="400"/>
    </g>
    <!-- moving horizontals -->
    <g class="floor">
      <line class="grid-line" x1="0" y1="265" x2="1000" y2="265" opacity="0.25"/>
      <line class="grid-line" x1="0" y1="278" x2="1000" y2="278" opacity="0.35"/>
      <line class="grid-line" x1="0" y1="295" x2="1000" y2="295" opacity="0.45"/>
      <line class="grid-line" x1="0" y1="318" x2="1000" y2="318" opacity="0.55"/>
      <line class="grid-line" x1="0" y1="348" x2="1000" y2="348" opacity="0.65"/>
      <line class="grid-line" x1="0" y1="385" x2="1000" y2="385" opacity="0.75"/>
    </g>
    <line x1="0" y1="260" x2="1000" y2="260" stroke="#00ffcc" stroke-width="1.5" opacity="0.8" filter="url(#glowCyan)"/>
  </g>

  <!-- ══ RISING PARTICLES ══ -->
  <g>
    <circle class="p1" cx="120" cy="360" r="2"   fill="#00ffcc"/>
    <circle class="p2" cx="260" cy="380" r="1.5" fill="#6e00ff"/>
    <circle class="p3" cx="720" cy="370" r="2"   fill="#00ffcc"/>
    <circle class="p4" cx="860" cy="385" r="1.5" fill="#b366ff"/>
    <circle class="p5" cx="540" cy="390" r="2"   fill="#00ffcc"/>
  </g>

  <!-- ══ HUD CORNER BRACKETS (draw in) ══ -->
  <g stroke="#00ffcc" stroke-width="2" fill="none" filter="url(#glowCyan)" stroke-dasharray="70" stroke-dashoffset="70">
    <path d="M 25 60 L 25 25 L 60 25"/>
    <path d="M 940 25 L 975 25 L 975 60"/>
    <path d="M 975 340 L 975 375 L 940 375"/>
    <path d="M 60 375 L 25 375 L 25 340"/>
    <animate attributeName="stroke-dashoffset" from="70" to="0" dur="0.9s" begin="0.3s" fill="freeze"/>
  </g>

  <!-- ══ TOP HUD TEXT ══ -->
  <g font-size="13" letter-spacing="3" opacity="0">
    <text x="45" y="48" fill="#00ffcc" class="blink">▶ PLAYER 1</text>
    <text x="955" y="48" fill="#b366ff" text-anchor="end">HI-SCORE&#160;&#160;999999</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze"/>
  </g>

  <!-- ══ GLITCH TITLE ══ -->
  <!-- reveal wipe -->
  <clipPath id="wipe">
    <rect x="0" y="120" width="0" height="110">
      <animate attributeName="width" from="0" to="1000" dur="0.7s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>
  </clipPath>

  <g clip-path="url(#wipe)" class="flicker">
    <!-- rgb split layers -->
    <text x="500" y="200" text-anchor="middle" font-size="72" font-weight="bold" letter-spacing="6" fill="#ff2d78" opacity="0.75">FATHI GHANEM
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -4 2; 0 0; 3 -2; 0 0; 0 0"
        keyTimes="0; 0.04; 0.08; 0.5; 0.54; 1" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="200" text-anchor="middle" font-size="72" font-weight="bold" letter-spacing="6" fill="#00ffcc" opacity="0.75">FATHI GHANEM
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 4 -2; 0 0; -3 2; 0 0; 0 0"
        keyTimes="0; 0.04; 0.08; 0.5; 0.54; 1" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <!-- main layer -->
    <text x="500" y="200" text-anchor="middle" font-size="72" font-weight="bold" letter-spacing="6" fill="#eafffa" filter="url(#glowBig)">FATHI GHANEM</text>
    <!-- glitch slice -->
    <rect x="0" y="168" width="1000" height="10" fill="#05060c" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0;1;0;0" keyTimes="0;0.03;0.05;0.07;0.5;0.52;0.54;1" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="150;185;165;190;150" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ══ SUBTITLE — typewriter ══ -->
  <clipPath id="typeClip">
    <rect x="230" y="215" width="0" height="30">
      <animate attributeName="width" from="0" to="540" dur="1.6s" begin="1.4s" fill="freeze" calcMode="linear"/>
    </rect>
  </clipPath>
  <text clip-path="url(#typeClip)" x="500" y="236" text-anchor="middle" font-size="17" letter-spacing="3" fill="#9be8d8">⚔ ENGINEER &#160;×&#160; GAMER &#160;×&#160; STORE OPERATOR ⚔</text>
  <rect x="768" y="222" width="9" height="17" fill="#00ffcc" opacity="0" class="blink">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3s" fill="freeze"/>
  </rect>

  <!-- ══ BOSS HP BAR ══ -->
  <g opacity="0">
    <text x="130" y="308" font-size="12" letter-spacing="2" fill="#ffd166">☠ BOSS&#160;&#160;—&#160;&#160;PRODUCTION BUG</text>
    <rect x="130" y="316" width="740" height="14" rx="7" fill="#0d1117" stroke="#6e00ff" stroke-width="1.5"/>
    <rect x="133" y="319" width="734" height="8" rx="4" fill="url(#hpGrad)">
      <animate attributeName="width" values="734;734;180;220;40;0" keyTimes="0;0.2;0.5;0.6;0.9;1" dur="7s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="870" y="308" font-size="12" text-anchor="end" fill="#00ffcc">DPS: 9999</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </g>

  <!-- ══ PRESS START ══ -->
  <text x="500" y="362" text-anchor="middle" font-size="15" letter-spacing="6" fill="#00ffcc" class="blink" filter="url(#glowCyan)" opacity="0">
    - PRESS START TO SCROLL -
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
  </text>

  <!-- ══ CRT OVERLAYS ══ -->
  <rect width="1000" height="400" fill="url(#scan)"/>
  <rect class="band" x="0" y="0" width="1000" height="50" fill="#ffffff" opacity="0.03"/>

  <!-- CRT power-on flash -->
  <rect x="0" y="199" width="1000" height="2" fill="#eafffa" opacity="1">
    <animate attributeName="height" values="2;400" dur="0.35s" begin="0.05s" fill="freeze"/>
    <animate attributeName="y" values="199;0" dur="0.35s" begin="0.05s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.45s" begin="0.1s" fill="freeze"/>
  </rect>
</svg>
