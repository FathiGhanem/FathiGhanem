<svg viewBox="0 0 1000 380" width="1000" height="380" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e00ff"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>
    <linearGradient id="xpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <filter id="glo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan2" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <style>
      @keyframes spin  { from { transform: rotate(0deg); }  to { transform: rotate(360deg); } }
      @keyframes spinR { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      .ring  { transform-origin: 190px 165px; animation: spin  14s linear infinite; }
      .ring2 { transform-origin: 190px 165px; animation: spinR 22s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.9; } 50% { opacity: 0.4; } }
      .pulse { animation: pulse 2.2s ease-in-out infinite; }
      @keyframes shimmer { from { transform: translateX(-160px); } to { transform: translateX(760px); } }
      .shimmer { animation: shimmer 2.8s ease-in-out 3.2s infinite; }
      @keyframes blink { 0%,55% {opacity:1;} 56%,100% {opacity:0;} }
      .blink { animation: blink 1.1s steps(1) infinite; }
    </style>
  </defs>

  <!-- ══ PANEL ══ -->
  <rect width="1000" height="380" rx="14" fill="#07090f"/>
  <rect x="1.5" y="1.5" width="997" height="377" rx="13" fill="none" stroke="#6e00ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="1.5" y="1.5" width="997" height="377" rx="13" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity="0.35" class="pulse"/>

  <!-- header strip -->
  <text x="40" y="46" font-size="16" letter-spacing="5" fill="#00ffcc" filter="url(#glo)">▚▚ CHARACTER SELECT</text>
  <text x="960" y="46" font-size="13" letter-spacing="2" text-anchor="end" fill="#b366ff">SERVER: AMMAN_JO &#160;•&#160; PING: 1ms</text>
  <line x1="40" y1="60" x2="960" y2="60" stroke="#6e00ff" stroke-width="1" opacity="0.5"/>

  <!-- ══ LEFT: AVATAR HEX ══ -->
  <g>
    <!-- rotating rings -->
    <g class="ring">
      <circle cx="190" cy="165" r="78" fill="none" stroke="#6e00ff" stroke-width="1.5" stroke-dasharray="14 10" opacity="0.8"/>
    </g>
    <g class="ring2">
      <circle cx="190" cy="165" r="90" fill="none" stroke="#00ffcc" stroke-width="1" stroke-dasharray="4 14" opacity="0.6"/>
    </g>
    <!-- hexagon -->
    <polygon points="190,105 242,135 242,195 190,225 138,195 138,135"
             fill="#0d1117" stroke="#00ffcc" stroke-width="2" filter="url(#glo)"/>
    <text x="190" y="182" text-anchor="middle" font-size="44" font-weight="bold" fill="#eafffa" letter-spacing="2" filter="url(#glo)">F7</text>

    <!-- rank plate -->
    <rect x="115" y="268" width="150" height="30" rx="6" fill="#0d1117" stroke="#ffd166" stroke-width="1.5"/>
    <text x="190" y="288" text-anchor="middle" font-size="13" letter-spacing="2" fill="#ffd166">★ LEGENDARY</text>

    <text x="190" y="325" text-anchor="middle" font-size="12" letter-spacing="2" fill="#9be8d8">CLASS: FULL-STACK RAIDER</text>
    <text x="190" y="345" text-anchor="middle" font-size="12" letter-spacing="2" fill="#b366ff">GUILD: FGGSTORE</text>
  </g>

  <!-- ══ RIGHT: STAT BARS ══ -->
  <!-- bar track template: x=360 w=460 -->
  <g font-size="13" letter-spacing="2">
    <!-- STR -->
    <text x="360" y="98"  fill="#eafffa">STR&#160;&#160;BACKEND MASTERY</text>
    <text x="880" y="98"  fill="#00ffcc" text-anchor="end" opacity="0">85<animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze"/></text>
    <rect x="360" y="106" width="520" height="10" rx="5" fill="#161b22"/>
    <rect x="360" y="106" width="0"   height="10" rx="5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="442" begin="0.3s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>

    <!-- INT -->
    <text x="360" y="142" fill="#eafffa">INT&#160;&#160;PROBLEM SOLVING</text>
    <text x="880" y="142" fill="#00ffcc" text-anchor="end" opacity="0">90<animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/></text>
    <rect x="360" y="150" width="520" height="10" rx="5" fill="#161b22"/>
    <rect x="360" y="150" width="0"   height="10" rx="5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="468" begin="0.5s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>

    <!-- DEX -->
    <text x="360" y="186" fill="#eafffa">DEX&#160;&#160;FRONTEND SKILLS</text>
    <text x="880" y="186" fill="#00ffcc" text-anchor="end" opacity="0">75<animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/></text>
    <rect x="360" y="194" width="520" height="10" rx="5" fill="#161b22"/>
    <rect x="360" y="194" width="0"   height="10" rx="5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="390" begin="0.7s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>

    <!-- WIS -->
    <text x="360" y="230" fill="#eafffa">WIS&#160;&#160;GAMING E-COMMERCE</text>
    <text x="880" y="230" fill="#00ffcc" text-anchor="end" opacity="0">88<animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/></text>
    <rect x="360" y="238" width="520" height="10" rx="5" fill="#161b22"/>
    <rect x="360" y="238" width="0"   height="10" rx="5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="458" begin="0.9s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>

    <!-- LCK -->
    <text x="360" y="274" fill="#eafffa">LCK&#160;&#160;GAMING SKILLS</text>
    <text x="880" y="274" fill="#ffd166" text-anchor="end" opacity="0">99<animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/></text>
    <rect x="360" y="282" width="520" height="10" rx="5" fill="#161b22"/>
    <rect x="360" y="282" width="0"   height="10" rx="5" fill="url(#xpGrad)" filter="url(#glo)">
      <animate attributeName="width" from="0" to="515" begin="1.1s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>
  </g>

  <!-- ══ XP BAR ══ -->
  <g clip-path="url(#xpClip)">
    <clipPath id="xpClip"><rect x="360" y="316" width="520" height="16" rx="8"/></clipPath>
    <rect x="360" y="316" width="520" height="16" fill="#161b22"/>
    <rect x="360" y="316" width="0" height="16" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="405" begin="1.4s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.1 1"/>
    </rect>
    <rect class="shimmer" x="360" y="316" width="70" height="16" fill="#ffffff" opacity="0.18" transform="skewX(-20)"/>
  </g>
  <rect x="360" y="316" width="520" height="16" rx="8" fill="none" stroke="#6e00ff" stroke-width="1.5"/>
  <text x="360" y="352" font-size="12" letter-spacing="2" fill="#9be8d8">XP → NEXT UNLOCK: SYSTEM DESIGN &#160;•&#160; CLOUD ARCH &#160;•&#160; AI INTEGRATION</text>
  <text x="880" y="332" font-size="11" text-anchor="end" fill="#eafffa" opacity="0">78%<animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/></text>

  <text x="905" y="352" font-size="12" fill="#00ffcc" class="blink">▶ OK</text>

  <rect width="1000" height="380" rx="14" fill="url(#scan2)"/>
</svg>
